<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foodie's Restaurant</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f8f9fa;
color:#333;
}

header{
background:#111;
color:white;
padding:15px 8%;
position:sticky;
top:0;
z-index:100;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:1.8rem;
font-weight:bold;
color:#ff9800;
}

nav ul{
display:flex;
list-style:none;
gap:25px;
}

nav a{
color:white;
text-decoration:none;
}

.hero{
height:85vh;
background:linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)),
url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=1600&q=80');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
padding:20px;
}

.hero-content h1{
font-size:3rem;
margin-bottom:15px;
}

.hero-content p{
font-size:1.2rem;
margin-bottom:20px;
}

.btn{
background:#ff9800;
border:none;
padding:12px 25px;
color:white;
border-radius:5px;
cursor:pointer;
font-size:1rem;
}

.section-title{
text-align:center;
margin:50px 0 30px;
font-size:2rem;
}

.menu-container{
width:90%;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 4px 12px rgba(0,0,0,.15);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-content{
padding:15px;
text-align:center;
}

.card h3{
margin-bottom:10px;
}

.price{
font-weight:bold;
color:#ff9800;
margin:10px 0;
}

.cart-section{
width:90%;
margin:50px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 0;
border-bottom:1px solid #ddd;
}

.qty-btn{
padding:5px 10px;
border:none;
background:#ff9800;
color:white;
cursor:pointer;
margin:0 3px;
}

.remove-btn{
background:red;
color:white;
border:none;
padding:6px 10px;
cursor:pointer;
}

.total{
text-align:right;
font-size:1.3rem;
font-weight:bold;
margin-top:15px;
}

.checkout-btn{
margin-top:20px;
float:right;
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
margin-top:60px;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:25px;
border-radius:10px;
width:90%;
max-width:400px;
}

.modal-content h2{
margin-bottom:15px;
}

.modal-content input,
.modal-content textarea{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
}

.receipt{
display:none;
width:90%;
max-width:600px;
margin:40px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

@media(max-width:768px){

.hero-content h1{
font-size:2rem;
}

nav{
flex-direction:column;
gap:15px;
}

nav ul{
flex-wrap:wrap;
justify-content:center;
}
}
</style>
</head>

<body>

<header>
<nav>
<div class="logo">Foodie's</div>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#menu">Menu</a></li>
<li><a href="#cart">Cart</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>
</header>

<section class="hero">
<div class="hero-content">
<h1>Delicious Food Delivered Fresh</h1>
<p>Enjoy your favorite meals anytime.</p>
<button class="btn" onclick="document.getElementById('menu').scrollIntoView()">Explore Menu</button>
</div>
</section>

<h2 class="section-title" id="menu">Our Menu</h2>

<div class="menu-container">

<div class="card">
<img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">
<div class="card-content">
<h3>Burger</h3>
<p class="price">₹199</p>
<button class="btn" onclick="addToCart('Burger',199)">Add To Cart</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1513104890138-7c749659a591">
<div class="card-content">
<h3>Pizza</h3>
<p class="price">₹299</p>
<button class="btn" onclick="addToCart('Pizza',299)">Add To Cart</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9">
<div class="card-content">
<h3>Pasta</h3>
<p class="price">₹249</p>
<button class="btn" onclick="addToCart('Pasta',249)">Add To Cart</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c">
<div class="card-content">
<h3>Salad</h3>
<p class="price">₹149</p>
<button class="btn" onclick="addToCart('Salad',149)">Add To Cart</button>
</div>
</div>

</div>

<section class="cart-section" id="cart">
<h2>Your Cart</h2>

<div id="cartItems"></div>

<div class="total">
Total: ₹<span id="total">0</span>
</div>

<button class="btn checkout-btn" onclick="openCheckout()">
Place Order
</button>

<div style="clear:both"></div>
</section>

<div class="modal" id="checkoutModal">
<div class="modal-content">

<h2>Checkout</h2>

<input type="text" id="customerName" placeholder="Full Name">

<input type="tel" id="customerPhone" placeholder="Phone Number">

<textarea id="customerAddress"
placeholder="Delivery Address"></textarea>

<button class="btn" onclick="placeOrder()">
Confirm Order
</button>

</div>
</div>

<div class="receipt" id="receipt"></div>

<footer id="contact">
<p>Foodie's Restaurant © 2026</p>
<p>Email: info@foodies.com</p>
</footer>

<script>

let cart=[];

function addToCart(name,price){

const item=cart.find(i=>i.name===name);

if(item){
item.qty++;
}
else{
cart.push({
name,
price,
qty:1
});
}

renderCart();
}

function renderCart(){

const container=
document.getElementById("cartItems");

container.innerHTML="";

let total=0;

cart.forEach((item,index)=>{

total+=item.price*item.qty;

container.innerHTML+=`
<div class="cart-item">

<div>
<strong>${item.name}</strong><br>
₹${item.price}
</div>

<div>

<button class="qty-btn"
onclick="changeQty(${index},-1)">-</button>

${item.qty}

<button class="qty-btn"
onclick="changeQty(${index},1)">+</button>

</div>

<button class="remove-btn"
onclick="removeItem(${index})">

Remove

</button>

</div>
`;
});

document.getElementById("total")
.innerText=total;
}

function changeQty(index,value){

cart[index].qty+=value;

if(cart[index].qty<=0){
cart.splice(index,1);
}

renderCart();
}

function removeItem(index){

cart.splice(index,1);

renderCart();
}

function openCheckout(){

if(cart.length===0){

alert("Cart is empty!");

return;
}

document.getElementById("checkoutModal")
.style.display="flex";
}

function placeOrder(){

const name=
document.getElementById("customerName").value;

const phone=
document.getElementById("customerPhone").value;

const address=
document.getElementById("customerAddress").value;

if(!name||!phone||!address){

alert("Please fill all details");

return;
}

let total=0;

let itemsHTML="";

cart.forEach(item=>{

total+=item.price*item.qty;

itemsHTML+=`
<li>
${item.name}
x ${item.qty}
</li>
`;
});

document.getElementById("receipt")
.innerHTML=`

<h2>Order Successfully Placed 🎉</h2>

<hr><br>

<p><strong>Name:</strong> ${name}</p>

<p><strong>Phone:</strong> ${phone}</p>

<p><strong>Address:</strong> ${address}</p>

<br>

<h3>Ordered Items</h3>

<ul>
${itemsHTML}
</ul>

<h3>Total: ₹${total}</h3>

<p>Estimated Delivery Time:
30 Minutes</p>

`;

document.getElementById("receipt")
.style.display="block";

document.getElementById("checkoutModal")
.style.display="none";

cart=[];

renderCart();

window.scrollTo({
top:document.body.scrollHeight,
behavior:"smooth"
});
}

renderCart();

</script>

</body>
</html>
